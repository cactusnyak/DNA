name: CI & Deploy

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      # prisma.config.ts resolves these at load time (even for `generate`);
      # tests are unit tests with mocks, so no real DB connection is made.
      DATABASE_URL: postgresql://dna_user:dna_password@localhost:5432/dna
      JWT_SECRET: ci-test-secret
      WEB_APP_URL: http://localhost:5173
      PORT: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm install
      - run: npx prisma generate
      - run: npm test
      - run: npm run build

  web:
    name: Web — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install
      - run: npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  deploy:
    name: Deploy web to Netlify (dna-demo)
    needs: [api, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://dna-demo.netlify.app
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Install Netlify CLI
        run: npm install -g netlify-cli@26.2.0
      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >-
          netlify deploy
          --prod
          --dir=web/dist
          --site="$NETLIFY_SITE_ID"
          --message "dev@${{ github.sha }} via GitHub Actions"
