services:
  postgres:
    image: postgres:17-alpine
    container_name: dna-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - dna_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dna-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - dna_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dna-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  dna_postgres_data:
  dna_uploads:
  caddy_data:
  caddy_config:
